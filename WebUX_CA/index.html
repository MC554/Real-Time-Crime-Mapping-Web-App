<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crime Analytics Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="chart.js"></script>

</head>

<body>

<header>
<h1>Crime Analytics Dashboard</h1>
</header>

<div class="container">

<!-- Stats -->
<div class="stats">

<div class="card">
<h3>Most Common Crime</h3>
<p id="commonCrime">Loading...</p>
</div>

<div class="card">
<h3>Total Crimes</h3>
<p id="totalCrimes">Loading...</p>
</div>

<div class="card">
<h3>Safest Area</h3>
<p id="safestArea">Loading...</p>
</div>

</div>

<!-- Charts -->
<div class="charts">

<div class="chart-box">
<h3>Crimes by Type</h3>
<canvas id="typeChart"></canvas>
</div>

<div class="chart-box">
<h3>Crimes by Area</h3>
<canvas id="areaChart"></canvas>
</div>

</div>

</div>

</body>
</html>
