<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dublin Live Crime Map | Quick Glance</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="style.css"/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        severity: {
                            5: '#ef4444',
                            4: '#f97316',
                            3: '#eab308',
                            2: '#3b82f6',
                            1: '#22c55e',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="text-slate-900 antialiased">

    <!-- Sidebar Toggle -->
    <button id="sidebar-toggle"
        class="fixed top-4 left-4 z-[60] bg-white p-3 rounded-2xl shadow-xl border border-slate-200 hover:bg-slate-50 transition-colors flex items-center justify-center">
        <span id="toggle-icon" class="material-symbols-outlined text-slate-700">menu</span>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="overlay-panel fixed inset-y-0 left-0 w-full sm:w-[400px] bg-white/95 backdrop-blur-md shadow-2xl border-r border-slate-200 flex flex-col p-6 pt-20 overflow-hidden">

        <!-- Logo -->
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                <span class="material-symbols-outlined">security</span>
            </div>
            <div>
                <h1 class="text-lg font-bold leading-none">Dublin Live</h1>
                <p class="text-xs text-slate-500 font-medium">Crime Landscape Insights</p>
            </div>
        </div>

        <!-- Navigation Bar -->
        <div class="flex items-center gap-6 mb-6 text-sm font-semibold select-none">

            <!-- Home (Active) -->
            <button onclick="window.location.href='index.html'" class="relative text-indigo-600 transition-colors group">
                Home
                <span class="absolute left-0 -bottom-1 w-full h-[2px] bg-indigo-600 rounded-full"></span>
            </button>

            <!-- Crime Feed -->
            <button class="relative text-slate-600 hover:text-indigo-600 transition-colors group">
                Crime Feed
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-indigo-600 rounded-full group-hover:w-full transition-all"></span>
            </button>

            <!-- Analytics -->
            <button onclick="window.location.href='analytics.html'" class="relative text-slate-600 hover:text-indigo-600 transition-colors group">
                Analytics
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-indigo-600 rounded-full group-hover:w-full transition-all"></span>
            </button>

            <!-- User Settings -->
            <button class="relative text-slate-600 hover:text-indigo-600 transition-colors group">
                User Settings
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-indigo-600 rounded-full group-hover:w-full transition-all"></span>
            </button>

        </div>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-8">

            <!-- Recent Incidents -->
            <section>
                <h2 class="text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">schedule</span>
                    Most Recent Incidents
                </h2>
                <div id="recent-list" class="space-y-3"></div>
            </section>

            <!-- Filters -->
            <section class="space-y-6">

                <div class="space-y-2">
                    <label class="text-[11px] font-bold uppercase tracking-widest text-slate-400">Location Search</label>
                    <div class="relative">
                        <input id="search-area" type="text"
                            class="w-full h-12 pl-11 pr-4 bg-slate-50 border-slate-200 rounded-xl text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                            placeholder="Temple Bar, Rathmines..."/>
                        <span class="material-symbols-outlined absolute left-3.5 top-3 text-slate-400">search</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold uppercase tracking-widest text-slate-400">Crime Type</label>
                        <select id="filter-type"
                            class="w-full h-12 bg-slate-50 border-slate-200 rounded-xl text-sm focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="all">All Types</option>
                            <option value="Theft">Theft</option>
                            <option value="Assault">Assault</option>
                            <option value="Vandalism">Vandalism</option>
                            <option value="Public Order">Public Order</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[11px] font-bold uppercase tracking-widest text-slate-400">Timeframe</label>
                        <select id="filter-time"
                            class="w-full h-12 bg-slate-50 border-slate-200 rounded-xl text-sm focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="24h">24 Hours</option>
                            <option value="7d">7 Days</option>
                            <option value="all">All Time</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[11px] font-bold uppercase tracking-widest text-slate-400">Visualization Mode</label>
                    <div class="flex p-1 bg-slate-100 rounded-xl">
                        <button id="btn-view-pins"
                            class="flex-1 h-10 flex items-center justify-center gap-2 text-xs font-semibold rounded-lg bg-white shadow-sm text-indigo-600 transition-all">
                            <span class="material-symbols-outlined text-sm">location_on</span> Pins
                        </button>
                        <button id="btn-view-heat"
                            class="flex-1 h-10 flex items-center justify-center gap-2 text-xs font-semibold rounded-lg text-slate-600 hover:text-slate-900 transition-all">
                            <span class="material-symbols-outlined text-sm">local_fire_department</span> Heat
                        </button>
                    </div>
                </div>

            </section>
        </div>

        <div class="pt-6 mt-6 border-t border-slate-100">
            <div class="bg-indigo-50/50 p-4 rounded-2xl flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-tighter">Current Scope</p>
                    <p class="text-sm font-bold text-indigo-900"><span id="crime-count">0</span> Active Incidents</p>
                </div>
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            </div>
        </div>

    </aside>

    <!-- Map -->
    <main class="relative h-screen w-full">
        <div id="map" class="h-full w-full"></div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    
    <script src="script.js"></script>

</body>
</html>
